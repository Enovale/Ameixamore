name: Setup SDK

description: "Setup SDK for build"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'gradle'
    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        packages: 'platform-tools'