name: Create Build

on:
  push:
    tags:
      - v*
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - run: ./gradlew test

  assemble:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - run: ./gradlew assembleChromaticDebug
      - run: ./gradlew assembleChromaticRelease
      - run: ./gradlew assembleMonochromaticDebug
      - run: ./gradlew assembleMonochromaticRelease

      - name: Sign APKs
        uses: Tlaster/android-sign@v1.2.2
        id: sign_app
        env:
          BUILD_TOOLS_VERSION: "30.0.3"
        with:
          releaseDirectory: |
            app/build/outputs/apk/chromatic/debug/
            app/build/outputs/apk/chromatic/release/
            app/build/outputs/apk/monochromatic/debug/
            app/build/outputs/apk/monochromatic/release/
          output: app/build/outputs/signed/
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APKs
        run: cd app/build/outputs/signed/ && rename "-unsigned" "" * && rename "-signed" "" *

      - name: Upload build tree
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-output
          path: app/build/outputs/

      - name: Upload Chromatic APK
        uses: actions/upload-artifact@v7.0.1
        with:
          archive: false
          path: app/build/outputs/signed/*-chromatic-release*

      - name: Upload Monochromatic APK
        uses: actions/upload-artifact@v7.0.1
        with:
          archive: false
          path: app/build/outputs/signed/*-monochromatic-release*

      - name: Create Prerelease
        if: github.ref == 'refs/heads/master'
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: true
          title: "Development Build"
          files: |
            LICENSE.txt
            app/build/outputs/signed/*.apk

      - name: Create tag release
        if: startsWith(github.ref, 'refs/tags/')
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false
          files: |
            LICENSE.txt
            app/build/outputs/signed/*-chromatic-release*
            app/build/outputs/signed/*-monochromatic-release*

  checkIcons:
    runs-on: ubuntu-latest
    needs: assemble
    steps:
      - uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - run: sudo apt-get --quiet install --yes imagemagick
      - run: bash check_icons.sh
