name: Create Build

on:
  push:
    tags:
      - v*
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - run: ./gradlew test

  assemble:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - run: ./gradlew assembleChromaticDebug
      - run: ./gradlew assembleChromaticRelease
      - run: ./gradlew assembleMonochromaticDebug
      - run: ./gradlew assembleMonochromaticRelease

      - name: Sign APKs
        uses: Tlaster/android-sign@v1.2.2
        id: sign_app
        env:
          BUILD_TOOLS_VERSION: "30.0.3"
        with:
          releaseDirectory: |
            app/build/outputs/apk/chromatic/debug/
            app/build/outputs/apk/chromatic/release/
            app/build/outputs/apk/monochromatic/debug/
            app/build/outputs/apk/monochromatic/release/
          output: app/build/outputs/signed/
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APKs
        run: |
          sudo apt-get --quiet install --yes util-linux
          cd app/build/outputs/signed/
          rename.ul -- "-unsigned" "" *
          rename.ul -- "-signed" "" *

      - name: Upload build tree
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-output
          path: app/build/outputs/

      - name: Upload Chromatic APK
        uses: actions/upload-artifact@v7.0.1
        with:
          archive: false
          path: app/build/outputs/signed/*-chromatic-release*

      - name: Upload Monochromatic APK
        uses: actions/upload-artifact@v7.0.1
        with:
          archive: false
          path: app/build/outputs/signed/*-monochromatic-release*

  checkIcons:
    runs-on: ubuntu-latest
    needs: assemble
    steps:
      - uses: actions/checkout@v6
      - name: Check Icons
        run: |
          sudo apt-get --quiet install --yes imagemagick
          bash check_icons.sh

  deployRelease:
    runs-on: ubuntu-latest
    needs: [assemble, checkIcons]
    if: needs.checkIcons.result == 'success'
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: "*"
          path: ./deploy

      - name: Get Short SHA
        id: get_short_sha
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Create nightly release
        id: create_release
        if: github.ref == 'refs/heads/main'
        uses: viperproject/create-nightly-release@v1
        env:
          # This token is provided by Actions, you do not need to create your own token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: latest-${{ env.SHORT_SHA }}
          release_name: Development Build
          body: Latest nightly release, matching main (beware!)
          keep_num: 0
          keep_tags: false

      - name: Upload prerelease artifacts
        uses: softprops/action-gh-release@v3
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest-${{ env.SHORT_SHA }}
          files: ./deploy/app-output/signed/*.apk

      - name: Create tag release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          prerelease: false
          artifacts: "deploy/*.apk/*.apk"
