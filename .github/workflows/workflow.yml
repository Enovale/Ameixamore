name: Create Debug Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ANDROID_COMPILE_SDK: "30"
  ANDROID_BUILD_TOOLS: "30.0.3"
  ANDROID_SDK_TOOLS: "4333796"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup
        uses: ./.github/actions/setup
      - run: ./gradlew test

  assemble:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - name: Setup
        uses: ./.github/actions/setup
      - run: ./gradlew assembleChromaticDebug
      - run: ./gradlew assembleChromaticRelease
      - run: ./gradlew assembleMonochromaticDebug
      - run: ./gradlew assembleMonochromaticRelease
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-output
          path: app/build/outputs/

  checkIcons:
    runs-on: ubuntu-latest
    needs: assemble
    steps:
      - uses: actions/checkout@v3
      - name: Setup
        uses: ./.github/actions/setup
      - run: sudo apt-get --quiet install --yes imagemagick
      - run: bash check_icons.sh